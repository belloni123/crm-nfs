version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nfs-crm-postgres
    restart: always
    environment:
      POSTGRES_DB: nfs_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password_secure_123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d nfs_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nfs-crm-app
    restart: always
    environment:
      - DATABASE_URL=postgresql://crm_user:crm_password_secure_123@postgres:5432/nfs_crm?schema=public
      - NEXTAUTH_URL=https://crm.nofrontscale.com.br
      - NEXTAUTH_SECRET=9a8b7c6d5e4f3g2h1i0j_nfs_crm_secret_token_key_here
      - EVOLUTION_API_URL=https://whats.agenciab16.com.br
      - EVOLUTION_API_KEY=KYuBALyLzl7xbeKq4w3PUiddqVkzOj9N
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local

